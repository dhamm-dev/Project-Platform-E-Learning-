<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manajemen Siswa — E-Learn Admin</title>
    <link rel="stylesheet" href="../../css/globals.css" />
    <link rel="stylesheet" href="../../css/components.css" />
    <link rel="stylesheet" href="../../css/layout.css" />
  </head>
  <body data-shell="admin">
    <div id="site-navbar"></div>
    <div class="admin-layout">
      <aside id="admin-sidebar"></aside>
      <main class="admin-main">
        <h1 class="page-title">Manajemen data siswa</h1>
        <p class="muted" style="margin-top: -1rem; margin-bottom: 1.25rem">
          Cari, suspensi sementara, atau reset akses (simulasi front-end).
        </p>
        <div class="admin-toolbar">
          <form class="card" style="padding: 1rem; display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: flex-end; flex: 1; min-width: 0">
            <div class="form-group" style="margin: 0; flex: 1; min-width: 180px">
              <label class="form-label" for="admin-s-q">Cari nama / email</label>
              <input class="form-control" id="admin-s-q" type="search" placeholder="mis. budi@" />
            </div>
            <button type="button" class="btn btn-secondary" data-admin-demo="cari-siswa">Terapkan filter</button>
          </form>
        </div>
        <div class="table-wrap">
          <table class="table-simple">
            <thead>
              <tr>
                <th>Nama</th>
                <th>Email</th>
                <th>Status</th>
                <th>Bergabung</th>
                <th>Kelas aktif</th>
              </tr>
            </thead>
            <tbody id="admin-students-tbody"></tbody>
          </table>
        </div>
      </main>
    </div>
    <div id="site-footer"></div>
    <script src="../../js/utils.js"></script>
    <script src="../../js/render.js"></script>
    <script src="../../js/main.js"></script>
  </body>
</html>
