<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Diskon &amp; Kupon — E-Learn</title>
    <link rel="stylesheet" href="../../css/globals.css" />
    <link rel="stylesheet" href="../../css/components.css" />
    <link rel="stylesheet" href="../../css/layout.css" />
  </head>
  <body data-shell="instructor">
    <div id="site-navbar"></div>
    <div class="instructor-layout">
      <aside id="instructor-sidebar"></aside>
      <main class="instructor-main">
        <h1 class="page-title">Diskon &amp; kupon kelas</h1>
        <p class="muted" style="margin-top: -1rem; margin-bottom: 1.5rem">
          Buat kode promosi terbatas per kelas untuk kampanye atau kerja sama mitra.
        </p>
        <form id="form-instructor-discount" class="card" style="padding: 1.35rem 1.45rem; margin-bottom: 1.5rem; max-width: 640px">
          <div class="split-2">
            <div class="form-group">
              <label class="form-label" for="disc-code">Kode kupon</label>
              <input class="form-control" id="disc-code" name="code" type="text" placeholder="MISAL10" style="text-transform: uppercase" />
              <p class="form-error" role="alert"></p>
            </div>
            <div class="form-group">
              <label class="form-label" for="disc-course">Kelas</label>
              <select class="form-control" id="disc-course" name="course">
                <option>Dasar Pemrograman Web</option>
                <option>Manajemen Produk Digital</option>
                <option>Workshop UI Mobile</option>
              </select>
            </div>
          </div>
          <div class="split-2">
            <div class="form-group">
              <label class="form-label" for="disc-type">Tipe</label>
              <select class="form-control" id="disc-type" name="type">
                <option>Persen</option>
                <option>Nominal tetap</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" for="disc-value">Nilai</label>
              <input class="form-control" id="disc-value" name="value" type="text" placeholder="10 atau 50000" />
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="disc-exp">Berlaku hingga</label>
            <input class="form-control" id="disc-exp" name="expires" type="date" />
          </div>
          <button class="btn btn-primary" type="submit">Tambahkan kupon</button>
        </form>
        <h2 class="section-heading" style="font-size: 1.1rem; margin-bottom: 0.75rem">Kupon aktif</h2>
        <div class="table-wrap">
          <table class="table-simple">
            <thead>
              <tr>
                <th>Kode</th>
                <th>Kelas</th>
                <th>Nilai</th>
                <th>Kedaluwarsa</th>
                <th>Pemakaian</th>
              </tr>
            </thead>
            <tbody id="instructor-discount-tbody"></tbody>
          </table>
        </div>
      </main>
    </div>
    <div id="site-footer"></div>
    <script src="../../js/utils.js"></script>
    <script src="../../js/render.js"></script>
    <script src="../../js/main.js"></script>
  </body>
</html>
