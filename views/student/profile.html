<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profil Siswa — E-Learn</title>
    <link rel="stylesheet" href="../../css/globals.css" />
    <link rel="stylesheet" href="../../css/components.css" />
    <link rel="stylesheet" href="../../css/layout.css" />
  </head>
  <body data-shell="student">
    <div id="site-navbar"></div>
    <div class="student-layout">
      <aside id="student-sidebar"></aside>
      <main class="student-main">
        <h1 class="page-title">Profil &amp; pengaturan akun</h1>
        <p class="muted" style="margin-top: -1rem; margin-bottom: 1.5rem">Perbarui informasi publik dan keamanan akun.</p>
        <div class="split-2">
          <form class="card" style="padding: 1.35rem" action="#" method="post">
            <h2 class="section-heading" style="font-size: 1.05rem">Data profil</h2>
            <div class="form-group">
              <label class="form-label" for="p-name">Nama tampilan</label>
              <input class="form-control" id="p-name" name="name" type="text" placeholder="Nama Siswa" />
            </div>
            <div class="form-group">
              <label class="form-label" for="p-email">Email</label>
              <input class="form-control" id="p-email" name="email" type="email" autocomplete="email" placeholder="Fulan@gmail.com" />
            </div>
            <div class="form-group">
              <label class="form-label" for="p-bio">Bio singkat</label>
              <textarea class="form-control" id="p-bio" name="bio" rows="3" placeholder="Minat belajar, tujuan karier…"></textarea>
            </div>
            <button class="btn btn-primary" type="button">Simpan perubahan (demo)</button>
          </form>
          <form class="card" style="padding: 1.35rem" action="#" method="post">
            <h2 class="section-heading" style="font-size: 1.05rem">Keamanan</h2>
            <div class="form-group">
              <label class="form-label" for="p-pass">Kata sandi baru</label>
              <input class="form-control" id="p-pass" name="password" type="password" autocomplete="new-password" />
            </div>
            <div class="form-group">
              <label class="form-label" for="p-pass2">Ulangi kata sandi</label>
              <input class="form-control" id="p-pass2" name="password2" type="password" autocomplete="new-password" />
            </div>
            <p class="form-hint">Gunakan minimal 8 karakter dan kombinasi huruf serta angka.</p>
            <button class="btn btn-secondary" type="button">Perbarui kata sandi (demo)</button>
          </form>
        </div>
      </main>
    </div>
    <div id="site-footer"></div>
    <script src="../../js/utils.js"></script>
    <script src="../../js/render.js"></script>
    <script src="../../js/main.js"></script>
  </body>
</html>
