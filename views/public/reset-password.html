<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Kata Sandi — E-Learn</title>
    <link rel="stylesheet" href="../../css/globals.css" />
    <link rel="stylesheet" href="../../css/components.css" />
    <link rel="stylesheet" href="../../css/layout.css" />
  </head>
  <body>
    <div id="site-navbar"></div>

    <main class="auth-page">
      <div class="auth-card-wrap">
        <div class="card auth-card">
          <h1>Reset kata sandi</h1>
          <p id="reset-token-note" class="banner-note" style="display: none"></p>
          <p class="auth-sub">Atur kata sandi baru untuk akun Anda.</p>
          <form id="form-reset-password" novalidate>
            <div class="form-group">
              <label class="form-label" for="reset-password">Kata sandi baru</label>
              <input
                class="form-control"
                type="password"
                id="reset-password"
                name="password"
                autocomplete="new-password"
                required
              />
              <p class="form-hint">Minimal 8 karakter.</p>
              <p class="form-error" role="alert"></p>
            </div>
            <div class="form-group">
              <label class="form-label" for="reset-password2">Konfirmasi kata sandi</label>
              <input
                class="form-control"
                type="password"
                id="reset-password2"
                name="password2"
                autocomplete="new-password"
                required
              />
              <p class="form-error" role="alert"></p>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Simpan kata sandi</button>
          </form>
          <div class="auth-alt">
            <a href="login.html">Kembali ke masuk</a>
          </div>
        </div>
      </div>
    </main>

    <div id="site-footer"></div>
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var token = params.get("token");
        var el = document.getElementById("reset-token-note");
        if (el && token) {
          el.style.display = "block";
          el.textContent = "Token reset terdeteksi pada URL (demo). Backend harus memverifikasi token sebelum form ini dipakai.";
        }
      })();
    </script>
    <script src="../../js/utils.js"></script>
    <script src="../../js/render.js"></script>
    <script src="../../js/main.js"></script>
  </body>
</html>
