<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lupa Kata Sandi — E-Learn</title>
    <link rel="stylesheet" href="../../css/globals.css" />
    <link rel="stylesheet" href="../../css/components.css" />
    <link rel="stylesheet" href="../../css/layout.css" />
  </head>
  <body>
    <div id="site-navbar"></div>

    <main class="auth-page">
      <div class="auth-card-wrap">
        <div class="card auth-card">
          <h1>Lupa kata sandi</h1>
          <p class="auth-sub">Masukkan email akun Anda. Kami akan mengirim tautan reset (simulasi front-end).</p>
          <form id="form-forgot-password" novalidate>
            <div class="form-group">
              <label class="form-label" for="forgot-email">Email</label>
              <input class="form-control" type="email" id="forgot-email" name="email" autocomplete="email" required />
              <p class="form-error" role="alert"></p>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Kirim tautan</button>
          </form>
          <div class="auth-alt">
            <a href="login.html">Kembali ke masuk</a>
          </div>
        </div>
      </div>
    </main>

    <div id="site-footer"></div>
    <script src="../../js/utils.js"></script>
    <script src="../../js/render.js"></script>
    <script src="../../js/main.js"></script>
  </body>
</html>
